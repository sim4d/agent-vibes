name: Deploy Claude Proxy

on:
  push:
    branches:
      - main
    paths:
      - "apps/protocol-bridge/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: apps/protocol-bridge
        run: npm install --ignore-scripts

      - name: Restore credentials from secrets
        working-directory: apps/protocol-bridge
        run: |
          mkdir -p data
          if [ -n "$ANTIGRAVITY_ACCOUNTS" ]; then
            printf "%s" "$ANTIGRAVITY_ACCOUNTS" > data/antigravity-accounts.json
          fi
          if [ -n "$CODEX_ACCOUNTS" ]; then
            printf "%s" "$CODEX_ACCOUNTS" > data/codex-accounts.json
          fi
          if [ -n "$OPENAI_COMPAT_ACCOUNTS" ]; then
            printf "%s" "$OPENAI_COMPAT_ACCOUNTS" > data/openai-compat-accounts.json
          fi
          if [ -n "$CLAUDE_API_ACCOUNTS" ]; then
            printf "%s" "$CLAUDE_API_ACCOUNTS" > data/claude-api-accounts.json
          fi
        env:
          ANTIGRAVITY_ACCOUNTS: ${{ secrets.ANTIGRAVITY_ACCOUNTS }}
          CODEX_ACCOUNTS: ${{ secrets.CODEX_ACCOUNTS }}
          OPENAI_COMPAT_ACCOUNTS: ${{ secrets.OPENAI_COMPAT_ACCOUNTS }}
          CLAUDE_API_ACCOUNTS: ${{ secrets.CLAUDE_API_ACCOUNTS }}

      - name: Build
        working-directory: apps/protocol-bridge
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "apps/protocol-bridge/dist/,apps/protocol-bridge/package.json,apps/protocol-bridge/.env.production.example,apps/protocol-bridge/data/"
          target: "/opt/protocol-bridge"
          strip_components: 2

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROXY_ENV_PRODUCTION: ${{ secrets.PROXY_ENV_PRODUCTION }}
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: PROXY_ENV_PRODUCTION,DEPLOY_DOMAIN
          script: |
            cd /opt/protocol-bridge
            if [ -n "$PROXY_ENV_PRODUCTION" ]; then
              printf "%s" "$PROXY_ENV_PRODUCTION" > .env
            elif [ -f .env.production ]; then
              cp .env.production .env
            else
              cp .env.production.example .env
            fi
            # Ensure Node.js 24 is installed
            if ! node --version 2>/dev/null | grep -q '^v24'; then
              curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
              apt-get install -y nodejs
            fi
            npm install --production --ignore-scripts
            # Setup SSL certificates for HTTPS/HTTP2
            mkdir -p /opt/protocol-bridge/certs
            ln -sf /etc/letsencrypt/live/$DEPLOY_DOMAIN/fullchain.pem /opt/protocol-bridge/certs/localhost.crt
            ln -sf /etc/letsencrypt/live/$DEPLOY_DOMAIN/privkey.pem /opt/protocol-bridge/certs/localhost.key
            # Register systemd service if not exists
            if [ ! -f /etc/systemd/system/protocol-bridge.service ]; then
              printf '%s\n' '[Unit]' 'Description=Protocol Bridge Service' 'After=network.target' '' '[Service]' 'Type=simple' 'WorkingDirectory=/opt/protocol-bridge' 'ExecStart=/usr/bin/node dist/main' 'Restart=on-failure' 'RestartSec=5' 'EnvironmentFile=/opt/protocol-bridge/.env' '' '[Install]' 'WantedBy=multi-user.target' > /etc/systemd/system/protocol-bridge.service
              systemctl daemon-reload
              systemctl enable protocol-bridge
            fi
            systemctl restart protocol-bridge
